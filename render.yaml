services:
  - type: web
    name: dalalak-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # FIREBASE_CREDENTIALS_JSON must be set manually in the Render dashboard
      # (Settings → Environment → Secret) — paste the full JSON of your
      # Firebase Admin SDK service account key.
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
    healthCheckPath: /
    autoDeploy: true
